<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>@localinference/utils browser e2e</title>
    <script type="importmap">
      {
        "imports": {
          "buffer": "/test/e2e/runsInBrowsers/buffer-stub.js",
          "fs": "/test/e2e/runsInBrowsers/fs-stub.js",
          "@sctg/sentencepiece-js": "/node_modules/@sctg/sentencepiece-js/dist/index.js",
          "@sovereignbase/bytecodec": "/node_modules/@sovereignbase/bytecodec/dist/index.js",
          "onnxruntime-web": "/node_modules/onnxruntime-web/dist/ort.bundle.min.mjs",
          "onnxruntime-web/all": "/node_modules/onnxruntime-web/dist/ort.all.bundle.min.mjs"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, 'Times New Roman', serif;
        background: radial-gradient(
          circle at top,
          #f5f0e8,
          #ece2d3 55%,
          #ded0ba 100%
        );
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(640px, 100%);
        background: rgba(255, 252, 247, 0.92);
        border: 1px solid rgba(77, 52, 35, 0.18);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 24px 60px rgba(77, 52, 35, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
      }

      p,
      pre {
        margin: 0;
      }

      pre {
        margin-top: 16px;
        padding: 16px;
        border-radius: 14px;
        background: #201814;
        color: #f6eee3;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Browser E2E</h1>
      <p id="status">Running browser scenario…</p>
      <pre id="details"></pre>
    </main>
    <script type="module" src="./runner.mjs"></script>
  </body>
</html>
